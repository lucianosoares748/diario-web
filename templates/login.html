<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Diário de Bordo</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='estilo.css') }}"
    />
  </head>
  <body>
    <div class="container px-3">
      <div class="card card-login bg-white p-4">
        <div class="text-center mb-4">
          <img
            src="{{ url_for('static', filename='logo.png') }}"
            class="logo-login img-fluid"
            alt="Logo Empresa"
            onerror="
              this.style.display = 'none';
              document.getElementById('texto-reserva').style.display = 'block';
            "
          />
          <h4
            id="texto-reserva"
            class="fw-bold m-0"
            style="display: none; color: #333"
          >
            DIÁRIO DE BORDO
          </h4>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %} {% if
        messages %} {% for category, message in messages %}
        <div class="alert alert-danger text-center py-2" role="alert">
          {{ message }}
        </div>
        {% endfor %} {% endif %} {% endwith %}

        <form action="/" method="POST">
          <div class="mb-3">
            <label class="form-label fw-bold">Usuário:</label>
            <input
              type="text"
              name="usuario"
              class="form-control form-control-lg"
              required
              placeholder="Digite seu usuário"
            />
          </div>
          <div class="mb-4">
            <label class="form-label fw-bold">Senha:</label>
            <input
              type="password"
              name="senha"
              class="form-control form-control-lg"
              required
              placeholder="••••"
            />
          </div>
          <button type="submit" class="btn btn-primary btn-custom w-100">
            Entrar
          </button>
        </form>
      </div>
    </div>
  </body>
</html>
